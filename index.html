<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подарок для тебя</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Бежево-белый градиент */
            background: linear-gradient(180deg, #FAE9C3 0%, #FFFFFF 100%);
            overflow: hidden;
            font-family: sans-serif;
            position: relative;
        }

        /* Пылинки */
        .particle {
            position: absolute;
            background-color: rgba(92, 29, 29, 0.4); /* Насыщенный бордовый */
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(40px); opacity: 0; }
        }

        /* Надпись "for you": ПО ЦЕНТРУ */
        .for-you {
            font-family: 'Great Vibes', cursive;
            font-size: 38px;
            color: #5C1D1D;
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%); /* Центрирование */
            z-index: 10;
            opacity: 0.9;
            width: 100%;
            text-align: center;
        }

        .container {
            position: relative;
            width: 320px;
            height: 400px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 60px;
            z-index: 5;
        }

        .envelope {
            width: 100%;
            z-index: 3;
            transition: all 0.8s ease;
        }

        .certificate {
            position: absolute;
            width: 95%;
            z-index: 2;
            opacity: 0;
            transform: translateY(0) scale(1);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container.open .envelope {
            opacity: 0;
            transform: translateY(120px);
            pointer-events: none;
        }

        .container.open .certificate {
            opacity: 1;
            /* Вылетает вверх, центрируется и увеличивается */
            transform: translateY(-60px) scale(1.15); 
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            animation: softSway 4s ease-in-out 1.2s infinite; /* Медленное покачивание */
        }

        /* Плавное люксовое покачивание */
        @keyframes softSway {
            0%, 100% { transform: translateY(-60px) scale(1.15) rotate(0deg); }
            50% { transform: translateY(-65px) scale(1.16) rotate(0.8deg); }
        }
    </style>
</head>
<body id="body">

    <div class="for-you">for you</div>

    <div class="container" id="giftContainer" onclick="openGift()">
        <img src="certificate.png" class="certificate" alt="Сертификат">
        <img src="envelope.png" class="envelope" alt="Конверт">
    </div>

    <script>
        // Функция создания бордовых пылинок
        function createParticles() {
            const body = document.getElementById('body');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 4 + 2 + 'px';
                particle.style.width = size;
                particle.style.height = size;
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.bottom = Math.random() * -15 + 'vh';
                
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = Math.random() * 15 + 15 + 's';
                
                particle.style.animationName = 'float';
                particle.style.animationIterationCount = 'infinite';
                particle.style.animationTimingFunction = 'linear';

                body.appendChild(particle);
            }
        }

        function openGift()
